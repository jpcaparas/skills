<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tweet Replica</title>
    <style>
      :root {
        --text: rgb(15, 20, 25);
        --muted: rgb(83, 100, 113);
        --line: rgb(239, 243, 244);
        --blue: rgb(29, 155, 240);
        --canvas-width: 594px;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      body {
        width: var(--canvas-width);
        overflow: hidden;
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .tweet-root {
        width: var(--canvas-width);
        padding: 0 16px;
        background: #fff;
      }

      .header {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding-top: 12px;
      }

      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        object-fit: cover;
        display: block;
        background: #d9d9d9;
        flex: 0 0 auto;
      }

      .avatar-fallback {
        display: none;
        width: 48px;
        height: 48px;
        border-radius: 999px;
        background: #d9d9d9;
        color: #444;
        font-size: 18px;
        font-weight: 700;
        align-items: center;
        justify-content: center;
      }

      .header-main {
        min-width: 0;
        flex: 1 1 auto;
      }

      .author-row {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .author-name {
        font-size: 20px;
        line-height: 1.15;
        font-weight: 700;
        white-space: nowrap;
      }

      .verified {
        width: 20px;
        height: 20px;
        color: var(--blue);
        flex: 0 0 auto;
      }

      .author-handle {
        margin-top: 2px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.2;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--muted);
        padding-top: 4px;
      }

      .header-actions svg {
        width: 21px;
        height: 21px;
      }

      .tweet-text {
        margin-left: 60px;
        margin-top: 10px;
        font-size: 18px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .media-wrap {
        margin-left: 60px;
        margin-top: 12px;
      }

      .media-shell {
        position: relative;
        width: 100%;
        max-width: 506px;
        border-radius: 24px;
        overflow: hidden;
        background: #000;
      }

      .media-shell video,
      .media-shell img,
      .quote-media-shell video,
      .quote-media-shell img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }

      .quote-wrap {
        margin-left: 60px;
        margin-top: 12px;
      }

      .quote-card {
        width: 100%;
        max-width: 530px;
        border: 1px solid rgb(207, 217, 222);
        border-radius: 24px;
        overflow: hidden;
        background: #fff;
      }

      .quote-inner {
        padding: 12px;
      }

      .quote-header {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }

      .quote-avatar {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        object-fit: cover;
        display: block;
        background: #d9d9d9;
        flex: 0 0 auto;
      }

      .quote-avatar-fallback {
        display: none;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        background: #d9d9d9;
        color: #444;
        font-size: 16px;
        font-weight: 700;
      }

      .quote-main {
        min-width: 0;
        flex: 1 1 auto;
      }

      .quote-author-row {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .quote-author-name {
        font-size: 18px;
        line-height: 1.15;
        font-weight: 700;
        word-break: break-word;
      }

      .quote-author-row .verified {
        width: 18px;
        height: 18px;
      }

      .quote-subline {
        margin-top: 2px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.2;
      }

      .quote-text {
        margin-top: 12px;
        font-size: 17px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .quote-media-shell {
        margin-top: 12px;
        border-radius: 18px;
        overflow: hidden;
        background: #000;
      }

      .meta-line {
        margin-left: 60px;
        margin-top: 16px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.35;
      }

      .divider {
        margin-left: 60px;
        margin-top: 14px;
        border-top: 1px solid var(--line);
      }

      .metrics-row {
        margin-left: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        color: var(--muted);
      }

      .metric-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 18px;
        line-height: 1.1;
      }

      .metric-item svg {
        width: 21px;
        height: 21px;
        flex: 0 0 auto;
      }

      .share-only {
        gap: 0;
      }
    </style>
  </head>
  <body>
    <div class="tweet-root">
      <div class="header">
        <img class="avatar" id="avatar" alt="">
        <div class="avatar-fallback" id="avatar-fallback"></div>
        <div class="header-main">
          <div class="author-row">
            <div class="author-name" id="author-name"></div>
            <div class="verified" id="verified-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.5 12.2l-2.18 2.53.3 3.33-3.27.75-1.71 2.87-3.14-1.34-3.14 1.34-1.71-2.87-3.27-.75.3-3.33L1.5 12.2l2.18-2.53-.3-3.33 3.27-.75 1.71-2.87 3.14 1.34 3.14-1.34 1.71 2.87 3.27.75-.3 3.33z"></path>
                <path d="M10.4 14.9l-2.2-2.2-1.4 1.4 3.6 3.6 6.2-6.2-1.4-1.4z" fill="#fff"></path>
              </svg>
            </div>
          </div>
          <div class="author-handle" id="author-handle"></div>
        </div>
        <div class="header-actions">
          <svg id="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5 6 9H3v6h3l5 4z"></path>
            <path d="m19 9-6 6"></path>
            <path d="m13 9 6 6"></path>
          </svg>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="5" cy="12" r="1.8"></circle>
            <circle cx="12" cy="12" r="1.8"></circle>
            <circle cx="19" cy="12" r="1.8"></circle>
          </svg>
        </div>
      </div>

      <div class="tweet-text" id="tweet-text"></div>

      <div class="quote-wrap" id="quote-wrap">
        <div class="quote-card">
          <div class="quote-inner">
            <div class="quote-header">
              <img class="quote-avatar" id="quote-avatar" alt="">
              <div class="quote-avatar-fallback" id="quote-avatar-fallback"></div>
              <div class="quote-main">
                <div class="quote-author-row">
                  <div class="quote-author-name" id="quote-author-name"></div>
                  <div class="verified" id="quote-verified-badge" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                      <path d="M22.5 12.2l-2.18 2.53.3 3.33-3.27.75-1.71 2.87-3.14-1.34-3.14 1.34-1.71-2.87-3.27-.75.3-3.33L1.5 12.2l2.18-2.53-.3-3.33 3.27-.75 1.71-2.87 3.14 1.34 3.14-1.34 1.71 2.87 3.27.75-.3 3.33z"></path>
                      <path d="M10.4 14.9l-2.2-2.2-1.4 1.4 3.6 3.6 6.2-6.2-1.4-1.4z" fill="#fff"></path>
                    </svg>
                  </div>
                </div>
                <div class="quote-subline" id="quote-subline"></div>
              </div>
            </div>
            <div class="quote-text" id="quote-text"></div>
            <div class="quote-media-shell" id="quote-media-shell">
              <video id="quote-video" playsinline muted preload="auto"></video>
              <img id="quote-image" alt="">
            </div>
          </div>
        </div>
      </div>

      <div class="media-wrap" id="media-wrap">
        <div class="media-shell" id="media-shell">
          <video id="video" playsinline muted preload="auto"></video>
          <img id="image" alt="">
        </div>
      </div>

      <div class="meta-line" id="meta-line"></div>
      <div class="divider"></div>

      <div class="metrics-row">
        <div class="metric-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4.5 5.5h15a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H8l-4 4v-13a2 2 0 0 1 2-2z"></path>
          </svg>
          <span id="count-reply"></span>
        </div>
        <div class="metric-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="m17 4 4 4-4 4"></path>
            <path d="M3 8h18"></path>
            <path d="M7 20 3 16l4-4"></path>
            <path d="M21 16H3"></path>
          </svg>
          <span id="count-repost"></span>
        </div>
        <div class="metric-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20.5s-7-4.35-7-10.08C5 6.55 7.4 4.5 10.1 4.5c1.56 0 2.96.78 3.9 2.02A4.72 4.72 0 0 1 17.9 4.5c2.7 0 5.1 2.05 5.1 5.92 0 5.73-7 10.08-7 10.08h-4z" transform="translate(-2 0)"></path>
          </svg>
          <span id="count-like"></span>
        </div>
        <div class="metric-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4.5h12a1 1 0 0 1 1 1v15l-7-4-7 4v-15a1 1 0 0 1 1-1z"></path>
          </svg>
          <span id="count-bookmark"></span>
        </div>
        <div class="metric-item share-only" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 5h4v4"></path>
            <path d="M10 14 19 5"></path>
            <path d="M19 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4"></path>
          </svg>
        </div>
      </div>
    </div>

    <script>
      const REPLICA = __REPLICA_JSON__;
      const avatar = document.getElementById("avatar");
      const avatarFallback = document.getElementById("avatar-fallback");
      const verifiedBadge = document.getElementById("verified-badge");
      const mediaWrap = document.getElementById("media-wrap");
      const mediaShell = document.getElementById("media-shell");
      const video = document.getElementById("video");
      const image = document.getElementById("image");
      const quoteWrap = document.getElementById("quote-wrap");
      const quoteAvatar = document.getElementById("quote-avatar");
      const quoteAvatarFallback = document.getElementById("quote-avatar-fallback");
      const quoteVerifiedBadge = document.getElementById("quote-verified-badge");
      const quoteMediaShell = document.getElementById("quote-media-shell");
      const quoteVideo = document.getElementById("quote-video");
      const quoteImage = document.getElementById("quote-image");
      const speakerIcon = document.getElementById("speaker-icon");

      function applyAvatar(author, imageEl, fallbackEl, verifiedEl) {
        if (!author) {
          imageEl.style.display = "none";
          fallbackEl.style.display = "none";
          verifiedEl.style.display = "none";
          return;
        }

        if (author.verified) {
          verifiedEl.style.display = "block";
        } else {
          verifiedEl.style.display = "none";
        }

        if (author.avatarUri) {
          imageEl.src = author.avatarUri;
          imageEl.style.display = "block";
          fallbackEl.style.display = "none";
        } else {
          imageEl.style.display = "none";
          fallbackEl.style.display = "flex";
          fallbackEl.textContent = (author.name || "?").slice(0, 1).toUpperCase();
        }
      }

      function applyMedia(media, shellEl, videoEl, imageEl) {
        if (!media) {
          shellEl.style.display = "none";
          return false;
        }
        shellEl.style.display = "block";
        shellEl.style.width = `${media.width}px`;
        shellEl.style.height = `${media.height}px`;
        if (media.kind === "video" || media.kind === "gif") {
          videoEl.src = media.uri;
          videoEl.style.display = "block";
          imageEl.style.display = "none";
          return true;
        }
        imageEl.src = media.uri;
        imageEl.style.display = "block";
        videoEl.style.display = "none";
        return false;
      }

      function setText(id, value) {
        document.getElementById(id).textContent = value || "";
      }

      function waitForImage(element) {
        return new Promise((resolve) => {
          if (!element || !element.getAttribute("src")) {
            resolve();
            return;
          }
          if (element.complete) {
            resolve();
            return;
          }
          element.addEventListener("load", () => resolve(), { once: true });
          element.addEventListener("error", () => resolve(), { once: true });
        });
      }

      function waitForVideo(element) {
        return new Promise((resolve) => {
          if (!element || !element.getAttribute("src")) {
            resolve();
            return;
          }
          if (element.readyState >= 1) {
            resolve();
            return;
          }
          element.addEventListener("loadedmetadata", () => resolve(), { once: true });
          element.addEventListener("error", () => resolve(), { once: true });
        });
      }

      function applyReplica() {
        document.documentElement.style.setProperty("--canvas-width", `${REPLICA.layout.canvasWidth}px`);
        document.title = REPLICA.canonicalUrl || "Tweet Replica";
        setText("author-name", REPLICA.post.author.name);
        setText("author-handle", `@${REPLICA.post.author.handle}`);
        setText("tweet-text", REPLICA.post.text);
        setText("meta-line", REPLICA.post.timestampLine);
        setText("count-reply", REPLICA.post.counts.reply);
        setText("count-repost", REPLICA.post.counts.repost);
        setText("count-like", REPLICA.post.counts.like);
        setText("count-bookmark", REPLICA.post.counts.bookmark);
        applyAvatar(REPLICA.post.author, avatar, avatarFallback, verifiedBadge);

        const topHasVideo = applyMedia(REPLICA.media, mediaShell, video, image);
        if (!REPLICA.media) {
          mediaWrap.style.display = "none";
        } else {
          mediaWrap.style.display = "block";
        }

        let quoteHasVideo = false;
        if (!REPLICA.quote) {
          quoteWrap.style.display = "none";
        } else {
          quoteWrap.style.display = "block";
          setText("quote-author-name", REPLICA.quote.author.name);
          setText("quote-subline", REPLICA.quote.subline);
          setText("quote-text", REPLICA.quote.text);
          applyAvatar(REPLICA.quote.author, quoteAvatar, quoteAvatarFallback, quoteVerifiedBadge);
          quoteHasVideo = applyMedia(REPLICA.quote.media, quoteMediaShell, quoteVideo, quoteImage);
        }

        if (!topHasVideo && !quoteHasVideo) {
          speakerIcon.style.visibility = "hidden";
        } else {
          speakerIcon.style.visibility = "visible";
        }
      }

      window.__replicaReady = false;
      window.__getRecordDurationMs = () => REPLICA.recordDurationMs || 4000;
      window.__startPlayback = async () => {
        const activeVideo = video.style.display === "block" ? video : (quoteVideo.style.display === "block" ? quoteVideo : null);
        if (activeVideo) {
          activeVideo.currentTime = 0;
          try {
            await activeVideo.play();
          } catch (error) {
            console.warn("Video playback did not start cleanly", error);
          }
        }
      };

      async function init() {
        applyReplica();
        await document.fonts.ready;
        await Promise.all([
          waitForImage(avatar),
          waitForImage(image),
          waitForVideo(video),
          waitForImage(quoteAvatar),
          waitForImage(quoteImage),
          waitForVideo(quoteVideo),
        ]);
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        window.__replicaReady = true;
      }

      init();
    </script>
  </body>
</html>
